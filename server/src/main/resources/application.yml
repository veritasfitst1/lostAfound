spring:
  application:
    name: server

  datasource:
    url: jdbc:mysql://localhost:3306/lost_found?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  profiles:
    active: dev

server:
  port: 8080

# JWT
jwt:
  secret: your-256-bit-secret-key-for-jwt-signing-lost-found-campus
  expiration-ms: 604800000

# 微信小程序 (占位，需替换为真实值)
wechat:
  appid: your_appid
  secret: your_secret

# 文件上传
upload:
  path: ./uploads
  url-prefix: /uploads
